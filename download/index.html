<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tennis Custom — Baixando…</title>
<meta name="theme-color" content="#0B1320" />
<meta name="robots" content="noindex, nofollow" />

<!-- Redirect imediato via meta -->
<meta http-equiv="refresh" content="0;url=https://apps.apple.com/app/id6761192994" />

<!-- Favicon -->
<link rel="icon" type="image/svg+xml" href="../favicon.svg" />
<link rel="apple-touch-icon" href="../favicon.svg" />

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;1,300&family=IBM+Plex+Mono:wght@400&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet" />

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0B1320;
    color: #F1F5F9;
    font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
    display: grid;
    place-items: center;
    text-align: center;
    padding: 24px;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 80% 50% at 50% 50%, rgba(56, 189, 248, 0.18), transparent 60%);
    pointer-events: none;
  }
  .wrap { position: relative; z-index: 1; max-width: 460px; }

  .logo-mark {
    width: 64px;
    height: 64px;
    border-radius: 16px;
    background: linear-gradient(135deg, #38BDF8 0%, #0EA5E9 100%);
    box-shadow: 0 0 48px rgba(56, 189, 248, 0.5);
    display: grid;
    place-items: center;
    color: #0B1320;
    font-weight: 700;
    font-size: 28px;
    font-family: 'IBM Plex Mono', monospace;
    margin: 0 auto 32px;
    animation: pulse 1.6s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.05); opacity: 0.92; }
  }

  .label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: #38BDF8;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    margin-bottom: 16px;
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-size: clamp(28px, 5vw, 36px);
    line-height: 1.15;
    letter-spacing: -0.02em;
    margin-bottom: 24px;
  }

  h1 em {
    font-style: italic;
    color: #38BDF8;
  }

  p {
    color: #94A3B8;
    font-size: 15px;
    margin-bottom: 32px;
    line-height: 1.5;
  }

  .fallback {
    display: inline-block;
    padding: 14px 28px;
    background: #38BDF8;
    color: #0B1320;
    border-radius: 12px;
    text-decoration: none;
    font-weight: 500;
    font-size: 15px;
    box-shadow: 0 8px 32px rgba(56, 189, 248, 0.3);
    transition: transform 0.2s;
  }

  .fallback:hover { transform: translateY(-2px); }

  .back {
    display: block;
    margin-top: 24px;
    color: #64748B;
    font-size: 13px;
    text-decoration: none;
  }

  .back:hover { color: #94A3B8; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="logo-mark">T</div>
    <div class="label">Redirecionando…</div>
    <h1>Abrindo a <em>App Store</em></h1>
    <p>Se a App Store não abrir automaticamente em alguns segundos, toque no botão abaixo.</p>
    <a href="https://apps.apple.com/app/id6761192994" class="fallback">Abrir App Store</a>
    <a href="/" class="back">Voltar ao site</a>
  </div>

  <script>
    // Fallback via JS (caso meta refresh não funcione)
    setTimeout(function() {
      window.location.href = 'https://apps.apple.com/app/id6761192994';
    }, 100);
  </script>
</body>
</html>
